name: ⚡ USB-Link Pro — Build Windows EXE

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: # Позволяет запускать сборку вручную из вкладки Actions

jobs:
  build-windows:
    name: 🖥️ Build Portable Windows EXE
    runs-on: windows-latest
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm install

      - name: 🔨 Build Portable Windows Executable
        run: npm run build-exe
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📂 Upload EXE to GitHub Actions Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: USB-Link-Pro-Windows-Portable
          path: dist/*.exe
          retention-days: 30

      - name: 🚀 Create GitHub Release (on Tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
